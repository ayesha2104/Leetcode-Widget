name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  QT_QPA_PLATFORM: offscreen

jobs:
  lint-type-test:
    name: Lint, type-check, test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Mypy
        run: mypy codepulse

      - name: Pytest
        run: pytest
